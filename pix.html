<!doctype html>
<html lang="pt-br">
<head>

  <title>PIX</title>
  <link rel="stylesheet" href="pix.css" />
</head>
<body>

  <div class="container">
    <div class="pix-box">

      <div class="codigo-pix" id="codigoPix">14 991462702</div>

      <button class="btn" onclick="copiarPix()">Copiar código PIX</button>

    </div>
  </div>

  <script src="pix.js"></script>
  <audio id="musicaFundo" loop>
  <source src="musica.mp3" type="audio/mpeg" />
</audio>
</body>
